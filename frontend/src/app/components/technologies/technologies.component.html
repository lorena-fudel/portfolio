<section id="technologies" class="technologies">
    <div class="container fade-in-up">
        <h2>Mis Tecnologías</h2>
        <p class="section-desc">Las herramientas y lenguajes que utilizo para construir soluciones digitales.</p>

        <div class="tech-grid" *ngIf="categories.length > 0; else loading">
            <div class="tech-category glass-card" *ngFor="let category of categories">
                <h3>{{ category.name }}</h3>

                <div class="skills-list">
                    <div class="skill-item" *ngFor="let tech of category.items">
                        <div class="skill-info">
                            <span class="skill-name">
                                <i [class]="tech.icon_class" *ngIf="tech.icon_class"></i>
                                {{ tech.name }}
                            </span>
                            <span class="skill-percentage">{{ tech.proficiency_level }}%</span>
                        </div>
                        <div class="skill-bar-bg">
                            <div class="skill-bar-fill" [style.width.%]="tech.proficiency_level"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <ng-template #loading>
            <div class="loading-spinner">
                <i class="fas fa-circle-notch fa-spin"></i>
                <p>Cargando tecnologías...</p>
            </div>
        </ng-template>
    </div>
</section>
