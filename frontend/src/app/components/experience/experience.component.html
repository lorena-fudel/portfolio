<section id="experience" class="experience">
    <div class="container fade-in-up">
        <h2>Mi Experiencia</h2>
        <p class="section-desc">Un recorrido por mi trayectoria profesional.</p>

        <div class="timeline" *ngIf="experiences.length > 0; else loading">
            <div class="timeline-item" *ngFor="let exp of experiences">
                <div class="timeline-dot"></div>
                <div class="timeline-content glass-card">
                    <div class="timeline-date">
                        {{ exp.start_date | date:'MMM yyyy' }} -
                        {{ exp.is_current ? 'Actualidad' : (exp.end_date | date:'MMM yyyy') }}
                    </div>
                    <h3 class="timeline-title">{{ exp.title }}</h3>
                    <h4 class="timeline-company">{{ exp.company }}</h4>
                    <p class="timeline-desc">{{ exp.description }}</p>
                </div>
            </div>
        </div>

        <ng-template #loading>
            <div class="loading-spinner">
                <i class="fas fa-circle-notch fa-spin"></i>
                <p>Cargando experiencia...</p>
            </div>
        </ng-template>
    </div>
</section>
