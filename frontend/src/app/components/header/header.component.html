<header class="header" [class.scrolled]="isScrolled">
    <div class="header-container container">
        <a href="#" class="logo">
            <span class="logo-text">LF</span>
            <span class="logo-dot">.</span>
        </a>

        <div class="header-actions">
            <button class="theme-toggle" (click)="toggleTheme()" aria-label="Cambiar tema">
                <i class="fas fa-moon" *ngIf="!isDarkMode"></i>
                <svg *ngIf="isDarkMode" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18"
                    height="18">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
            </button>
            <button class="mobile-toggle" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen">
                <i class="fas" [class.fa-bars]="!isMenuOpen" [class.fa-times]="isMenuOpen"></i>
            </button>
        </div>

        <nav class="nav" [class.open]="isMenuOpen">
            <ul class="nav-list">
                <li class="nav-item"><a href="#about" (click)="closeMenu()">Sobre mí</a></li>
                <li class="nav-item"><a href="#technologies" (click)="closeMenu()">Mis tecnologías</a>
                </li>
                <li class="nav-item"><a href="#experience" (click)="closeMenu()">Experiencia</a></li>
                <li class="nav-item"><a href="#goals" (click)="closeMenu()">Propósitos</a></li>
                <li class="nav-item"><a href="#projects" (click)="closeMenu()">Mis Proyectos</a></li>
                <li class="nav-item"><a href="#contact" (click)="closeMenu()">Contacto</a></li>
                <li class="nav-item blog-link"><a href="#" target="_blank" (click)="closeMenu()">Mi Blog</a></li>
            </ul>
        </nav>
    </div>
</header>
